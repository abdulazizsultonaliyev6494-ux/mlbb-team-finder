<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Team Finder</title>
    <style>
        body { background:#111827; color:white; font-family:Arial,sans-serif; padding:20px; text-align:center; }
        .box { max-width:350px; margin:auto; background:#1f2937; border-radius:20px; padding:20px; }
        input, select { width:100%; padding:12px; margin-top:10px; border:none; border-radius:10px; background:#374151; color:white; box-sizing:border-box; }
        button { width:100%; margin-top:15px; padding:12px; border:none; border-radius:10px; background:#f59e0b; color:black; font-weight:bold; cursor:pointer; }
        #status { margin-top:15px; color:#34d399; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🔥 MLBB Team Finder</h2>
    <input id="nickname" placeholder="Nickname">
    <select id="rank">
        <option>Epic</option>
        <option>Legend</option>
        <option>Mythic</option>
    </select>
    <select id="role">
        <option>Gold Lane</option>
        <option>EXP Lane</option>
        <option>Mid Lane</option>
        <option>Roamer</option>
        <option>Jungle</option>
    </select>
    <button onclick="saveData()">Save</button>
    <p id="status"></p>
</div>

<!-- Supabase SDK - BU JUDA MUHIM -->
<script src="https://jsdelivr.net"></script>

<script>
    // Siz yuborgan ma'lumotlar bilan sozladim
    const SB_URL = "https://mwdnfdcsunctrgyaaguh.supabase.co"; 
    const SB_KEY = "sb_publishable_wNIGrNUoRcUfetWpED-GXg_01XqBtAX";

    const mlbbClient = window.supabase.createClient(SB_URL, SB_KEY);

    async function saveData() {
        const nickname = document.getElementById("nickname").value;
        const rank = document.getElementById("rank").value;
        const role = document.getElementById("role").value;
        const statusEl = document.getElementById("status");

        if (!nickname) {
            statusEl.innerText = "Iltimos, Nickname kiriting!";
            statusEl.style.color = "#f87171";
            return;
        }

        statusEl.innerText = "Saqlanmoqda...";
        statusEl.style.color = "#fbbf24";

        try {
            const { error } = await mlbbClient
                .from("players")
                .insert([{ nickname, rank, role }]);

            if (error) {
                statusEl.innerText = "Xato: " + error.message;
                statusEl.style.color = "#f87171";
                console.error("Supabase xatosi:", error);
            } else {
                statusEl.innerText = "Muvaffaqiyatli saqlandi! ✅";
                statusEl.style.color = "#34d399";
                document.getElementById("nickname").value = "";
            }
        } catch (err) {
            statusEl.innerText = "Ulanishda xatolik!";
            statusEl.style.color = "#f87171";
            console.error("Catch xatosi:", err);
        }
    }
</script>

</body>
</html>
